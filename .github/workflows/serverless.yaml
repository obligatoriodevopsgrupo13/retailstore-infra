name: Serverless CI/CD

on:
  push:
    branches: ["main", "develop"]
    paths:
      - "serverless/**"
      - ".github/workflows/serverless.yml"
  pull_request:
    branches: ["main", "develop"]
    paths:
      - "serverless/**"
      - ".github/workflows/serverless.yml"

permissions:
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    name: SAM ${{ github.ref_name == 'main' && 'prod' || 'dev' }}
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_DEFAULT_REGION: us-east-1

    defaults:
      run:
        working-directory: serverless

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: SAM Build
        run: sam build

      - name: SAM Validate
        run: sam validate

      - name: SAM Deploy (dev)
        if: github.ref_name == 'develop' && github.event_name != 'pull_request'
        run: |
          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides Environment=dev ClusterName=retail-cluster-dev

      - name: SAM Deploy (prod)
        if: github.ref_name == 'main' && github.event_name != 'pull_request'
        run: |
          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides Environment=prod ClusterName=retail-cluster-prod
