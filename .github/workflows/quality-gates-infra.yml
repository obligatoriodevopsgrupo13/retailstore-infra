name: Quality Gates Infra

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main
      - 'feature/**'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  terraform-format-validate:
    name: Terraform Format and Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init and validate
        run: |
          set -e

          found=0

          for dir in $(find . -type f -name "*.tf" -not -path "*/.terraform/*" -exec dirname {} \; | sort -u); do
            if [ -f "$dir/main.tf" ] || [ -f "$dir/versions.tf" ] || [ -f "$dir/providers.tf" ]; then
              echo "========================================"
              echo "Validating Terraform directory: $dir"
              echo "========================================"

              terraform -chdir="$dir" init -backend=false
              terraform -chdir="$dir" validate

              found=1
            fi
          done

          if [ "$found" -eq 0 ]; then
            echo "ERROR: No Terraform directories found."
            exit 1
          fi

  tflint:
    name: TFLint
    runs-on: ubuntu-latest
    needs:
      - terraform-format-validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Show TFLint version
        run: tflint --version

      - name: Init TFLint
        run: tflint --init

      - name: Run TFLint recursively
        run: tflint --recursive --config "$(pwd)/.tflint.hcl"

  trivy-iac-scan:
    name: Trivy IaC Scan
    runs-on: ubuntu-latest
    needs:
      - terraform-format-validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy IaC misconfiguration scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: .
          format: table
          severity: CRITICAL
          exit-code: '1'
          trivyignores: ./.trivyignore

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified
